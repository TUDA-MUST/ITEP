<canvas babylonsjsview>
  <app-excitation-renderer
    [transducers]="transducers()"
    [selection]="selection()"
    [transducerModel]="transducerModel()"
    (hovered)="transducerHovered($event)"
  />

  <!-- @if (ura()) {
  <app-ura-interaction [arrayConfig]="arrayConfig()" (arrayConfigChange)="setArrayConfig($event)" />
  } -->

  <app-transducer-buffer [transducers]="transducers()" [beamforming]="beamforming()" [k]="k()">
    @if (rayleighEnabled()) {
      <app-rayleigh-probe-renderer
        [enabled]="rayleighVectorModeEnabled()"
        [resultSet]="rayleighResultSet()"
        [point]="rayleighProbePoint()"
        (pointChange)="onRayleighProbePointChanged($event)"
      />

      <app-rayleigh-integral-renderer
        [transducers]="transducers()"
        [environment]="arrayConfig().environment"
        [aspect]="rayleighAspect()"
        [resultSet]="rayleighResultSet()"
        [globalPhase]="globalPhase()"
      />

      <app-rayleigh-vector-rays-renderer
        [enabled]="rayleighVectorModeEnabled()"
        [transducers]="transducers()"
        [point]="rayleighProbePoint()"
      />
    }

    @if (farfieldEnabled()) {
      <app-farfield-renderer
        [transducers]="transducers()"
        [environment]="arrayConfig().environment"
        [transducerModel]="transducerModel()"
      />
    }
    <app-export-renderer
      [transducers]="transducers()"
      [environment]="k()"
      (results)="onNewResults($event)"
      [beamforming]="beamforming()"
    />

    <app-export-image-renderer [resultSet]="rayleighResultSet()" />
  </app-transducer-buffer>
  <ng-content />
</canvas>
