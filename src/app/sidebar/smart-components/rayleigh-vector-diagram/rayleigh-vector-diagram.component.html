<svg viewBox="-1 -1 2 2" aria-label="Rayleigh vector diagram">
  <title>Rayleigh vector diagram</title>
  <defs>
    <marker
      id="sum-arrowhead"
      markerWidth="6"
      markerHeight="6"
      viewBox="0 0 10 10"
      refX="9.5"
      refY="5"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path d="M 0 0 L 10 5 L 0 10 L 2.5 5 Z" class="sum-arrowhead" />
    </marker>
  </defs>
  <circle cx="0" cy="0" r="0.95" class="frame" />
  <line x1="-1" y1="0" x2="1" y2="0" class="axis" />
  <line x1="0" y1="-1" x2="0" y2="1" class="axis" />

  @if (chainPath()) {
    <path [attr.d]="chainPath()" class="chain" />
  }

  @for (segment of diagram().segments; track $index) {
    <line
      [attr.x1]="segment.start.x"
      [attr.y1]="-segment.start.y"
      [attr.x2]="segment.end.x"
      [attr.y2]="-segment.end.y"
      [attr.stroke]="segment.color"
      class="vector"
    />
  }

  <line
    x1="0"
    y1="0"
    [attr.x2]="diagram().sum.x"
    [attr.y2]="-diagram().sum.y"
    marker-end="url(#sum-arrowhead)"
    class="sum"
  />
</svg>

<div class="stats">
  <div [textContent]="elementsLabel()"></div>
  <div [textContent]="magnitudeLabel()"></div>
  <div [textContent]="phaseLabel()"></div>
</div>
