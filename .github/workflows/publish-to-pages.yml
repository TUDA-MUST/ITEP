name: Publish to github pages
run-name: ${{ github.actor }} is publishing to GitHub Actions 🚀
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.5.2'
          cache: true
      - name: Build Angular app
        run: |
          pnpm version ${{ github.event.release.tag_name }} --git-tag-version=false
          pnpm install --frozen-lockfile
          pnpm approve-builds --all
          pnpm run build -- --base-href https://TUDA-MUST.github.io/ITEP/
          cp dist/phased/browser/index.html dist/phased/browser/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist/phased/browser'

  deploy:
    # Add a dependency to the build job
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # or the latest "vX.X.X" version tag for this action
